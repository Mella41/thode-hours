<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Thode Hours Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="header">
        <h1>Thode Hours Tracker</h1>
        <div class="hero-figure" aria-hidden="true">
          <svg viewBox="0 0 160 90">
            <!-- Thode box -->
            <rect x="20" y="20" width="120" height="60" rx="8" ry="8" class="thode-box" />
            <text x="80" y="32" text-anchor="middle" class="thode-label">THODE</text>

            <!-- Desk -->
            <line x1="45" y1="55" x2="115" y2="55" />

            <!-- Stick figure sitting -->
            <!-- Head -->
            <circle cx="55" cy="40" r="7" />
            <!-- Body -->
            <line x1="55" y1="47" x2="55" y2="60" />
            <!-- Legs sitting -->
            <line x1="55" y1="60" x2="48" y2="70" />
            <line x1="55" y1="60" x2="62" y2="70" />
            <!-- Left arm on desk -->
            <line x1="55" y1="52" x2="65" y2="52" />
            <!-- Right arm on keyboard -->
            <line x1="55" y1="52" x2="70" y2="49" />

            <!-- Laptop -->
            <rect x="72" y="42" width="18" height="10" />
            <line x1="72" y1="52" x2="88" y2="58" />
            <line x1="90" y1="52" x2="88" y2="58" />
          </svg>
        </div>
        <p class="hint" style="margin-top: 8px;">
          Note: you can only log same-day hours, so don't forget to log!
        </p>
      </header>

      <main class="main">
        <section class="card auth-card" id="auth-section">
          <div class="tabs">
            <button class="tab active" id="tab-login">Log in</button>
            <button class="tab" id="tab-signup">Sign up</button>
          </div>

          <form id="login-form" class="form visible">
            <div class="field">
              <label for="login-identifier">Email or username</label>
              <input type="text" id="login-identifier" required />
            </div>
            <div class="field">
              <label for="login-password">Password</label>
              <input type="password" id="login-password" required />
            </div>
            <button type="submit" class="btn primary">Log in</button>
          </form>

          <form id="signup-form" class="form">
            <div class="field">
              <label for="signup-username">Username</label>
              <input type="text" id="signup-username" required />
            </div>
            <div class="field">
              <label for="signup-email">Email</label>
              <input type="email" id="signup-email" required />
            </div>
            <div class="field">
              <label for="signup-password">Password</label>
              <input type="password" id="signup-password" required />
            </div>
            <button type="submit" class="btn primary">Create account</button>
          </form>

          <p class="error" id="auth-error"></p>
        </section>

        <section class="card app-card hidden" id="app-section">
          <div class="app-header">
            <div>
              <h2 id="welcome-text">Welcome</h2>
              <div class="month-switcher">
                <button id="month-prev" class="btn subtle btn-icon" type="button">&#x25C0;</button>
                <p id="current-month-label"></p>
                <button id="month-next" class="btn subtle btn-icon" type="button">&#x25B6;</button>
              </div>
            </div>
            <button id="logout-btn" class="btn subtle" type="button">Log out</button>
          </div>

          <div class="layout">
            <section class="subcard">
              <h3>Log your time today</h3>
              <form id="log-form">
                <div class="field">
                  <label for="log-date">Date</label>
                  <input type="date" id="log-date" required />
                </div>
                <div class="field-inline">
                  <div class="field">
                    <label for="log-arrival">Arrival (HH:MM)</label>
                    <input type="time" id="log-arrival" required />
                  </div>
                  <div class="field">
                    <label for="log-departure">Departure (HH:MM)</label>
                    <input type="time" id="log-departure" required />
                  </div>
                </div>
                <div class="field">
                  <label for="log-productivity">How productive were you?</label>
                  <select id="log-productivity" required>
                    <option value="Super locked">Super locked</option>
                    <option value="Locked">Locked</option>
                    <option value="Studying with a side of yap">Studying with a side of yap</option>
                    <option value="Yap with a side of study">Yap with a side of study</option>
                    <option value="Did basically nothing">Did basically nothing</option>
                  </select>
                </div>
                <button type="submit" class="btn primary">Save entry</button>
                <p class="error" id="log-error"></p>
                <p class="success" id="log-success"></p>
                <p class="hint" id="log-lock-message"></p>
              </form>
            </section>

            <section class="subcard">
              <h3 id="logs-title">Your month at Thode</h3>
              <p class="hint" id="logs-subtitle"></p>
              <p id="your-total"></p>
              <div class="table-wrapper">
                <table>
                  <thead>
                    <tr>
                      <th>Date</th>
                      <th>Arrival</th>
                      <th>Departure</th>
                      <th>Hours</th>
                      <th>Productivity</th>
                      <th></th>
                    </tr>
                  </thead>
                  <tbody id="logs-table-body"></tbody>
                </table>
              </div>
            </section>
          </div>

          <section class="subcard">
            <h3>Leaderboard (this month)</h3>
            <div class="table-wrapper">
              <table>
                <thead>
                  <tr>
                    <th>#</th>
                    <th>Name</th>
                    <th>Total hours</th>
                    <th>Avg productivity / 5</th>
                    <th>Streak (days)</th>
                  </tr>
                </thead>
                <tbody id="leaderboard-body"></tbody>
              </table>
            </div>
          </section>
        </section>
      </main>

      <footer class="footer">
        <small>#thodedemon</small>
      </footer>
    </div>

    <script src="app.js"></script>
  </body>
  </html>
